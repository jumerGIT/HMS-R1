{% extends "housing/base.html" %}
{% block title %}Village Map – HMS{% endblock %}

{% block extra_head %}
<style>
.map-wrap {
  position: relative;
  width: 100%;
  background: #f8fafc;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}
.map-wrap svg {
  width: 100%;
  display: block;
  cursor: grab;
}
.map-wrap svg.panning { cursor: grabbing; }

/* Zoom toolbar */
.zoom-toolbar {
  position: absolute;
  bottom: 14px;
  right: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.zoom-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  background: #fff;
  color: #334155;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
  transition: background .15s;
}
.zoom-btn:hover { background: #f1f5f9; }
.zoom-btn:active { background: #e2e8f0; }

.house-path {
  cursor: pointer;
  opacity: 0.82;
  transition: opacity 0.1s;
}
.house-path:hover { opacity: 1; stroke: #fff; stroke-width: 1.5px; }
</style>
{% endblock %}

{% block content %}

    <h4 class="mb-0"><i class="bi bi-map me-2"></i>Village Map</h4>
    <div class="d-flex gap-3 align-items-center">
      <span class="badge fs-6" style="background:#3D3DF9;">&#9632; Available</span>
      <span class="badge fs-6" style="background:#e9573f;">&#9632; Occupied</span>
      <small class="text-muted"><i class="bi bi-mouse2 me-1"></i>Scroll to zoom · Drag to pan</small>
    </div>
  </div>

  <!-- Site tabs -->
  <ul class="nav nav-tabs" id="mapTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="site1-tab" data-bs-toggle="tab"
              data-bs-target="#site1" type="button" role="tab">
        Brgy. Old Poblacion <span class="badge bg-secondary ms-1">{{ site1_houses|length }}</span>
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="site2-tab" data-bs-toggle="tab"

<script>
const canAllocate = {{ can_allocate|yesno:"true,false" }};

function getCsrf() {
  var m = document.cookie.match(/csrftoken=([^;]+)/);
  return m ? m[1] : '';
}

// ── SvgPanZoom ────────────────────────────────────────────────────────────────
class SvgPanZoom {
  constructor(svgEl, opts) {
    opts = opts || {};
    this.svg        = svgEl;
    this.minScale   = opts.minScale   || 0.5;
    this.maxScale   = opts.maxScale   || 12;
    this.zoomStep   = opts.zoomStep   || 0.15;

    var vb      = svgEl.viewBox.baseVal;
    this.origX  = vb.x;
    this.origY  = vb.y;
    this.origW  = vb.width;
    this.origH  = vb.height;
    this.vx     = vb.x;
    this.vy     = vb.y;
    this.vw     = vb.width;
    this.vh     = vb.height;
    this.ratio  = vb.height / vb.width;

    this.panning   = false;
    this.wasDragged = false;
    this._lx = 0; this._ly = 0;
    this._dragDist = 0;

    // touch pinch state
    this._t0 = null; this._t1 = null;
    this._pinchDist = 0;
    this._pinchVx = 0; this._pinchVy = 0;
    this._pinchVw = 0; this._pinchVh = 0;
    this._pinchMidSvg = null;

    this._bind();
  }

  _bind() {
    var s = this.svg;
    s.style.cursor = 'grab';
    s.addEventListener('wheel',      this._wheel.bind(this),      { passive: false });
    s.addEventListener('mousedown',  this._mdown.bind(this));
    s.addEventListener('mousemove',  this._mmove.bind(this));
    s.addEventListener('mouseup',    this._mup.bind(this));
    s.addEventListener('mouseleave', this._mup.bind(this));
    s.addEventListener('touchstart', this._tstart.bind(this),     { passive: false });
    s.addEventListener('touchmove',  this._tmove.bind(this),      { passive: false });
    s.addEventListener('touchend',   this._tend.bind(this));
  }

  _apply(x, y, w, h) {
    var minW = this.origW / this.maxScale;
    var maxW = this.origW / this.minScale;
    if (w < minW) w = minW;
    if (w > maxW) w = maxW;
    h = w * this.ratio;
    this.vx = x; this.vy = y; this.vw = w; this.vh = h;
    this.svg.setAttribute('viewBox', x + ' ' + y + ' ' + w + ' ' + h);
  }

  _svgPt(cx, cy) {
    var r = this.svg.getBoundingClientRect();
    return {
      x: this.vx + (cx - r.left) / r.width  * this.vw,
      y: this.vy + (cy - r.top)  / r.height * this.vh,
    };
  }

  _wheel(e) {
    e.preventDefault();
    var f  = e.deltaY > 0 ? (1 + this.zoomStep) : (1 - this.zoomStep);
    var pt = this._svgPt(e.clientX, e.clientY);
    var nw = this.vw * f, nh = this.vh * f;
    this._apply(
      pt.x - (pt.x - this.vx) * (nw / this.vw),
      pt.y - (pt.y - this.vy) * (nh / this.vh),
      nw, nh
    );
  }

  _mdown(e) {
    if (e.button !== 0) return;
    this.panning    = true;
    this.wasDragged = false;
    this._dragDist  = 0;
    this._lx = e.clientX; this._ly = e.clientY;
    this.svg.classList.add('panning');
  }

  _mmove(e) {
    if (!this.panning) return;
    var r  = this.svg.getBoundingClientRect();
    var dx = (e.clientX - this._lx) / r.width  * this.vw;
    var dy = (e.clientY - this._ly) / r.height * this.vh;
    this._dragDist += Math.abs(e.clientX - this._lx) + Math.abs(e.clientY - this._ly);
    if (this._dragDist > 4) this.wasDragged = true;
    this._lx = e.clientX; this._ly = e.clientY;
    this._apply(this.vx - dx, this.vy - dy, this.vw, this.vh);
  }

  _mup() {
    this.panning = false;
    this.svg.classList.remove('panning');
  }

  _dist(a, b) { return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY); }

  _tstart(e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      var r = this.svg.getBoundingClientRect();
      this._t0 = e.touches[0]; this._t1 = e.touches[1];
      this._pinchDist = this._dist(this._t0, this._t1);
      this._pinchVx = this.vx; this._pinchVy = this.vy;
      this._pinchVw = this.vw; this._pinchVh = this.vh;
      var mx = (this._t0.clientX + this._t1.clientX) / 2;
      var my = (this._t0.clientY + this._t1.clientY) / 2;
      this._pinchMidSvg = {
        x: this.vx + (mx - r.left) / r.width  * this.vw,
        y: this.vy + (my - r.top)  / r.height * this.vh,
      };
      this.panning = false;
    } else if (e.touches.length === 1) {
      this.panning    = true;
      this.wasDragged = false;
      this._dragDist  = 0;
      this._lx = e.touches[0].clientX;
      this._ly = e.touches[0].clientY;
    }
  }

  _tmove(e) {
    if (e.touches.length === 2 && this._pinchMidSvg) {
      e.preventDefault();
      var r     = this.svg.getBoundingClientRect();
      var dist  = this._dist(e.touches[0], e.touches[1]);
      var scale = this._pinchDist / dist;
      var mx    = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var my    = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      var fx    = (mx - r.left) / r.width;
      var fy    = (my - r.top)  / r.height;
      var nw    = this._pinchVw * scale;
      var nh    = this._pinchVh * scale;
      this._apply(
        this._pinchMidSvg.x - fx * nw,
        this._pinchMidSvg.y - fy * nh,
        nw, nh
      );
    } else if (e.touches.length === 1 && this.panning) {
      e.preventDefault();
      var r  = this.svg.getBoundingClientRect();
      var dx = (e.touches[0].clientX - this._lx) / r.width  * this.vw;
      var dy = (e.touches[0].clientY - this._ly) / r.height * this.vh;
      this._dragDist += Math.abs(e.touches[0].clientX - this._lx) + Math.abs(e.touches[0].clientY - this._ly);
      if (this._dragDist > 6) this.wasDragged = true;
      this._lx = e.touches[0].clientX;
      this._ly = e.touches[0].clientY;
      this._apply(this.vx - dx, this.vy - dy, this.vw, this.vh);
    }
  }

  _tend(e) {
    if (e.touches.length < 2) this._pinchMidSvg = null;
    if (e.touches.length === 0) this.panning = false;
  }

  zoom(factor) {
    var cx = this.vx + this.vw / 2, cy = this.vy + this.vh / 2;
    var nw = this.vw * factor;
    this._apply(cx - nw / 2, cy - nw * this.ratio / 2, nw, nw * this.ratio);
  }

  reset() { this._apply(this.origX, this.origY, this.origW, this.origH); }
}

// Init both maps
var pz = {
  'svg-site1': new SvgPanZoom(document.getElementById('svg-site1')),
  'svg-site2': new SvgPanZoom(document.getElementById('svg-site2')),
};

// Wire toolbar buttons
document.querySelectorAll('.zoom-toolbar').forEach(function(tb) {
  var id = tb.dataset.svg;
  tb.querySelector('.zoom-in').addEventListener('click',    function() { pz[id].zoom(0.75); });
  tb.querySelector('.zoom-out').addEventListener('click',   function() { pz[id].zoom(1.35); });
  tb.querySelector('.zoom-reset').addEventListener('click', function() { pz[id].reset(); });
});

// ── House click → modal ───────────────────────────────────────────────────────
document.querySelectorAll('.house-path').forEach(function(path) {
  path.addEventListener('click', function() {
    // Don't fire modal if user was panning
    var svgEl = path.closest('svg');
    var pzInst = svgEl ? pz[svgEl.id] : null;
    if (pzInst && pzInst.wasDragged) { pzInst.wasDragged = false; return; }

    var id       = this.dataset.id;
    var address  = this.dataset.address;
    var status   = this.dataset.status;
    var resident = this.dataset.resident;

    var modal  = new bootstrap.Modal(document.getElementById('houseModal'));
    var body   = document.getElementById('houseModalBody');
    var footer = document.getElementById('houseModalFooter');

    document.getElementById('houseModalLabel').textContent = address;
    footer.style.display = 'none';

    var statusColor = status === 'Available' ? '#3D3DF9' : '#e9573f';
    var html = '<table class="table table-sm mb-0">' +
      '<tr><th style="width:110px">Address</th><td>' + address + '</td></tr>' +
      '<tr><th>Status</th><td><span class="badge" style="background:' + statusColor + '">' + status + '</span></td></tr>' +
      '<tr><th>Resident</th><td>' + (resident || '—') + '</td></tr>' +
      '</table>';

    if (canAllocate && status === 'Available') {
      html += '<hr class="my-2"><h6 class="mb-2">Allocate this house</h6>' +
        '<select id="applicantSelect" class="form-select form-select-sm" data-house-id="' + id + '">' +
          '<option value="">Loading approved applicants…</option>' +
        '</select>';
      footer.style.display = '';
    }

    body.innerHTML = html;
    modal.show();

    if (canAllocate && status === 'Available') {
      fetch('/api/approved-applicants/', { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var sel = document.getElementById('applicantSelect');
          if (!sel) return;
          if (!Array.isArray(data) || data.length === 0) {
            sel.innerHTML = '<option value="">No approved applicants without a house</option>';
          } else {
            sel.innerHTML = '<option value="">Select an applicant…</option>' +
              data.map(function(a) {
                return '<option value="' + a.id + '">' + a.full_name + '</option>';
              }).join('');
          }
        })
        .catch(function() {
          var sel = document.getElementById('applicantSelect');
          if (sel) sel.innerHTML = '<option value="">Error loading applicants</option>';
        });
    }
  });
});

document.getElementById('confirmAllocateBtn').addEventListener('click', function() {
  var sel = document.getElementById('applicantSelect');
  if (!sel) return;
  var houseId     = parseInt(sel.dataset.houseId);
  var applicantId = parseInt(sel.value);

  if (!applicantId) { alert('Please select an applicant first.'); return; }

  var btn = this;
  btn.disabled = true;
  btn.textContent = 'Allocating…';

  fetch('/api/allocate/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
    credentials: 'same-origin',
    body: JSON.stringify({ house_id: houseId, applicant_id: applicantId }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.detail) {
      alert(data.detail);
      location.reload();
    } else {
      alert('Allocation failed: ' + JSON.stringify(data));
      btn.disabled = false;
      btn.textContent = 'Confirm Allocation';
    }
  })
  .catch(function() {
    alert('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Confirm Allocation';
  });
});
</script>
{% endblock %}
