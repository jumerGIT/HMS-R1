<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>400 – Bad Request | ECIMMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: #64748b;
    }
    .error-icon {
      font-size: 3rem;
      color: #94a3b8;
    }
    .btn-home {
      background: #0038A8;
      color: #fff;
      border-radius: 9px;
      padding: .55rem 1.5rem;
      font-weight: 600;
      text-decoration: none;
    }
    .btn-home:hover { background: #002d87; color: #fff; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon mb-2"><i class="bi bi-question-circle"></i></div>
    <div class="error-code">400</div>
    <h4 class="mt-2 mb-1 fw-700">Bad Request</h4>
    <p class="text-muted mb-4">
      The server couldn't understand your request. Please check the URL and try again.
    </p>
    <a href="/" class="btn-home btn">Go to Dashboard</a>
  </div>
</body>
</html>
